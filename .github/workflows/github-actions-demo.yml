name: Github Actions Demo

on:
   workflow_dispatch:
   push:
     branches: main
     paths-ignore: .github
   pull_request:
    branches: main
   schedule:
     - cron: 15 6 * * 0

jobs:
  Build:
    name: Build
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Output event name
        run: echo "Triggered by event: ${{ github.event_name }}"

      - name: Output current branch
        run: echo "Current branch: ${{ github.ref_name }}"

      - name: List all files in repository
        run: ls -laR 
